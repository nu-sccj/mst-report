<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4d74e6;
            --secondary-color: #2c3e50;
            --accent-color: #3498db;
            --background-color: #f8f9fa;
            --text-color: #333;
            --white: #ffffff;
            --transition: all 0.3s ease-in-out;
            --box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            --border-radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body, html {
            height: 100%;
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--background-color);
            overflow-x: hidden;
        }

        .page-wrapper {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        .container {
            position: relative;
            max-width: 800px;
            text-align: center;
            z-index: 10;
            padding: 4rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            animation: fadeInUp 1.2s ease-out;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: var(--secondary-color);
            line-height: 1.3;
            animation: fadeInUp 0.8s forwards;
            animation-delay: 0.3s;
            opacity: 0;
            transform: translateY(20px);
        }

        .coming-soon {
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            font-size: 1.8rem;
            margin: 2rem 0;
            color: var(--primary-color);
            letter-spacing: 2px;
            animation: fadeInUp 0.8s forwards;
            animation-delay: 0.6s;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Background Elements */
        .background {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            z-index: -2;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        /* Animated Circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            filter: blur(60px);
            animation: floatAnimation 15s infinite alternate ease-in-out;
        }

        .circle:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--primary-color);
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .circle:nth-child(2) {
            width: 400px;
            height: 400px;
            background: var(--secondary-color);
            bottom: -100px;
            right: -100px;
            animation-delay: 5s;
        }

        .circle:nth-child(3) {
            width: 350px;
            height: 350px;
            background: var(--accent-color);
            top: 40%;
            left: 60%;
            animation-delay: 2.5s;
        }

        .circle:nth-child(4) {
            width: 280px;
            height: 280px;
            background: var(--primary-color);
            top: 60%;
            left: 20%;
            animation-delay: 7s;
        }

        /* Line Animations */
        .lines-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .line {
            position: absolute;
            background: var(--primary-color);
            opacity: 0.2;
        }

        .horizontal-line {
            height: 1px;
            width: 100%;
            transform-origin: left center;
            animation: lineGrow 8s infinite alternate ease-in-out;
        }

        .vertical-line {
            width: 1px;
            height: 100%;
            transform-origin: top center;
            animation: lineGrow 8s infinite alternate ease-in-out;
        }

        .horizontal-line:nth-child(1) { top: 10%; animation-delay: 0s; }
        .horizontal-line:nth-child(2) { top: 30%; animation-delay: 2s; }
        .horizontal-line:nth-child(3) { top: 50%; animation-delay: 1s; }
        .horizontal-line:nth-child(4) { top: 70%; animation-delay: 3s; }
        .horizontal-line:nth-child(5) { top: 90%; animation-delay: 4s; }

        .vertical-line:nth-child(6) { left: 10%; animation-delay: 0.5s; }
        .vertical-line:nth-child(7) { left: 30%; animation-delay: 2.5s; }
        .vertical-line:nth-child(8) { left: 50%; animation-delay: 1.5s; }
        .vertical-line:nth-child(9) { left: 70%; animation-delay: 3.5s; }
        .vertical-line:nth-child(10) { left: 90%; animation-delay: 4.5s; }

        /* Particles */
        .particle {
            position: absolute;
            background: var(--primary-color);
            border-radius: 50%;
            opacity: 0.3;
            animation: moveParticle 20s infinite linear;
        }

        /* Animations */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatAnimation {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, 20px) rotate(5deg); }
            100% { transform: translate(-20px, 10px) rotate(-5deg); }
        }

        @keyframes lineGrow {
            0% { transform: scaleX(0); opacity: 0.1; }
            50% { opacity: 0.2; }
            100% { transform: scaleX(1); opacity: 0.1; }
        }

        @keyframes moveParticle {
            0% { 
                transform: translate(var(--start-x), var(--start-y)); 
                opacity: 0; 
            }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { 
                transform: translate(var(--end-x), var(--end-y)); 
                opacity: 0; 
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 2rem;
                margin: 1rem;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .coming-soon {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="animated-bg">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    
    <div class="lines-container">
        <div class="line horizontal-line"></div>
        <div class="line horizontal-line"></div>
        <div class="line horizontal-line"></div>
        <div class="line horizontal-line"></div>
        <div class="line horizontal-line"></div>
        <div class="line vertical-line"></div>
        <div class="line vertical-line"></div>
        <div class="line vertical-line"></div>
        <div class="line vertical-line"></div>
        <div class="line vertical-line"></div>
    </div>
    
    <div id="particles-container"></div>
    
    <div class="page-wrapper">
        <div class="container">
            <h1>Understanding the Physical and Psychological Health and Wellness Needs of Minor Sex Trafficking Victims</h1>
            <div class="coming-soon">Coming Soon</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Create particles manually
            const particlesContainer = document.getElementById('particles-container');
            const numberOfParticles = 80;
            
            for (let i = 0; i < numberOfParticles; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random size
                const size = Math.random() * 4 + 2;
                
                // Random positions for start and end
                const startX = Math.random() * 100;
                const startY = Math.random() * 100;
                const endX = Math.random() * 100;
                const endY = Math.random() * 100;
                
                // Random animation duration
                const duration = Math.random() * 15 + 10;
                
                // Random delay
                const delay = Math.random() * 5;
                
                // Set styles
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${startX}%`;
                particle.style.top = `${startY}%`;
                particle.style.setProperty('--start-x', `${startX}%`);
                particle.style.setProperty('--start-y', `${startY}%`);
                particle.style.setProperty('--end-x', `${endX}%`);
                particle.style.setProperty('--end-y', `${endY}%`);
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;
                
                // Random color
                const colors = [
                    'var(--primary-color)', 
                    'var(--secondary-color)', 
                    'var(--accent-color)'
                ];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                particlesContainer.appendChild(particle);
            }
        });
    </script>
</body>
</html>
